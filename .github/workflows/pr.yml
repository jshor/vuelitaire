name: Pull Request

on:
  pull_request:
    branches:
      - main
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install npm dependencies
        run: yarn
      - name: Run linter
        run: yarn lint
      - name: Run unit tests
        run: yarn test:ci
      - name: Build app
        run: yarn build
